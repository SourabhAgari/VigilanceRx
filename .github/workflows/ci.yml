name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven          # keys ~/.m2/repository on hash of pom.xml

      - name: Build and test
        run: mvn -B clean verify

      - name: Sonar Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B sonar:sonar

      - name: Docker build (no push)
        if: hashFiles('Dockerfile') != ''    # activates when Phase 2 adds it
        run: docker build -t rx-vigilance:ci