# GKE / Redpanda Cloud connection facts (Phase 2 smoke test, verified 2026-07-21).
# Non-secret only - SASL/registry credentials come from the kafka-credentials
# K8s Secret via KAFKA_SASL_USERNAME/KAFKA_SASL_PASSWORD env vars (see section 9), never

# from this file. Consumed by config/JobConfig.java (Phase 4) via --config.file.


# Kafka (Redpanda Cloud)
kafka.brokers=d9dhs6gi8skvgsajf9n0.any.us-east-1.mpx.prd.cloud.redpanda.com:9092
kafka.security.protocol=SASL_SSL
kafka.sasl.mechanism=SCRAM-SHA-256

# Schema Registry
schema.registry.url=https://d9dhs6gi8skvgsajf9n0.registry.us-east-1.mpx.prd.cloud.redpanda.com
schema.registry.basic.auth.credentials.source=USER_INFO

# Flink Checkpointing
checkpoint.dir=gs://vigilancerx-502702-rx-vigilance-ckpt/rx-vigilance-ckpt

